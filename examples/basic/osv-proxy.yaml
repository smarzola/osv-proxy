server:
  bind: "127.0.0.1:8080"
  public_base_url: "http://127.0.0.1:8080"
upstreams:
  cargo:
    sparse_index_url: "https://index.crates.io"
    download_url: "https://static.crates.io/crates"
policy:
  minimum_age: "72h"
  missing_publish_time: "block"
  osv:
    block_malicious: true
    on_error: "block"
