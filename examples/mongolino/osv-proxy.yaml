server:
  listen: "0.0.0.0:8080"
  public_base_url: "http://127.0.0.1:8080"
upstreams:
  npm:
    registry_url: "https://registry.npmjs.org"
  pypi:
    simple_url: "https://pypi.org/simple"
    files_url: "https://files.pythonhosted.org"
policy:
  minimum_age: "72h"
  missing_publish_time: "block"
  malicious:
    mode: "local"
    only_mal_ids: true
    osv_api_url: "https://api.osv.dev"
    on_osv_error: "block"
malicious_store:
  mongodb:
    uri: "mongodb://mongolino:27017"
    database: "osv_proxy"
    collection: "malicious_packages"
  sync:
    enabled: true
    interval: "15m"
    ecosystems: ["npm", "PyPI"]
metadata_cache:
  enabled: false
artifacts:
  behavior: "redirect"
observability:
  audit_log: true
  metrics: true
  log_level: "info"
