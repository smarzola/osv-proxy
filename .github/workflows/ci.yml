name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt

      - name: Audit Rust dependencies
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit --file Cargo.lock

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21.0.7+6.0.LTS'

      - name: Install Maven
        shell: bash
        env:
          MAVEN_VERSION: '3.9.11'
          MAVEN_SHA512: 'bcfe4fe305c962ace56ac7b5fc7a08b87d5abd8b7e89027ab251069faebee516b0ded8961445d6d91ec1985dfe30f8153268843c89aa392733d1a3ec956c9978'
        run: |
          set -euo pipefail
          archive="apache-maven-${MAVEN_VERSION}-bin.tar.gz"
          base="https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries"
          mkdir -p "${RUNNER_TEMP}/maven"
          cd "${RUNNER_TEMP}/maven"
          curl --fail --location --retry 3 --output "${archive}" "${base}/${archive}"
          echo "${MAVEN_SHA512}  ${archive}" | sha512sum --check --strict
          tar --extract --gzip --file "${archive}"
          echo "${RUNNER_TEMP}/maven/apache-maven-${MAVEN_VERSION}/bin" >> "${GITHUB_PATH}"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          cache-disabled: true

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.128'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Install Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.8'
          bundler: '2.5.23'
          bundler-cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Install zip
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes zip

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check

      - name: Run Clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked
