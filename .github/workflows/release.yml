name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag, version, and changelog
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, got ${tag}" >&2
            exit 1
          fi

          git fetch origin main --tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Tagged commit ${GITHUB_SHA} is not contained in origin/main" >&2
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(awk '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && /^version[[:space:]]*=/ {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [[ "${cargo_version}" != "${version}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match tag ${tag}" >&2
            exit 1
          fi

          if ! grep -Eq "^## \\[${version}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a dated ## [${version}] section" >&2
            exit 1
          fi

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\] - " { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "CHANGELOG.md section for ${version} is empty" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"
          target="${{ matrix.target }}"
          package="osv-proxy-v${version}-${target}"

          mkdir -p "dist/${package}"
          cp "target/${target}/release/osv-proxy" "dist/${package}/osv-proxy"
          chmod 0755 "dist/${package}/osv-proxy"
          cp README.md "dist/${package}/README.md"
          cp CHANGELOG.md "dist/${package}/CHANGELOG.md"

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: osv-proxy-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release notes and checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\] - " { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "CHANGELOG.md section for ${version} is empty" >&2
            exit 1
          fi

          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
